                    </div>

                    <div className="flex justify-end gap-4">
                        <button onClick={downloadProtocol} className="flex items-center gap-2 px-6 py-3 rounded-full bg-teal-600 text-white text-xs font-bold uppercase tracking-widest hover:bg-teal-500 transition-colors">
                            <Download size={16}/> Download Full Report
                        </button>
                        <button onClick={handleShare} className={`flex items-center gap-2 px-6 py-3 rounded-full border text-xs font-bold uppercase tracking-widest transition-colors ${theme === 'dark' ? 'border-neutral-700 hover:bg-neutral-800' : 'border-neutral-200 hover:bg-neutral-50'}`}>
                            <Share2 size={16}/> Share
                        </button>
                    </div>
                </div>
            );
        };

        const AmberClinicLocator = ({ theme, user, showMessage }) => {
            const [selected, setSelected] = useState(null);
            const [date, setDate] = useState('');
            const [time, setTime] = useState('');
            const [searchTerm, setSearchTerm] = useState('');
            const [bookingState, setBookingState] = useState('idle');

            const handleBook = async () => {
                if(!user) { showMessage('Please login to book', 'error'); return; }
                if(!selected || !date || !time) { showMessage('Please fill all fields', 'error'); return; }
                
                setBookingState('processing');
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'appointments'), {
                        type: 'Clinic Collection', locationId: selected.id, locationName: selected.name, date, time, timestamp: serverTimestamp()
                    });
                    setTimeout(() => {
                        setBookingState('success');
                        setTimeout(() => {
                            setBookingState('idle'); setSelected(null); setDate(''); setTime(''); showMessage('Clinic Booking Confirmed!');
                        }, 2000);
                    }, 1500);
                } catch(e) {
                    setBookingState('idle'); showMessage('Booking failed', 'error');
                }
            };

            const filteredClinics = CLINICS_LIST.filter(c => c.name.toLowerCase().includes(searchTerm.toLowerCase()) || c.address.toLowerCase().includes(searchTerm.toLowerCase()));

            return (
                <div className="max-w-5xl mx-auto pt-12 pb-24 px-6 animate-fadeIn">
                    <h2 className={`text-4xl font-light mb-12 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>Collection Centers</h2>
                    <div className="mb-8 flex gap-4">
                        <div className="flex-1 relative">
                            <Search className={`absolute left-4 top-1/2 -translate-y-1/2 ${theme === 'dark' ? 'text-neutral-500' : 'text-neutral-400'}`} size={18}/>
                            <input 
                                type="text" placeholder="Search nearby clinics..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                                className={`w-full pl-12 pr-4 py-3 rounded-full outline-none border transition-colors ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800 text-white placeholder-neutral-600 focus:border-teal-500' : 'bg-white border-neutral-200 text-black placeholder-neutral-400 focus:border-teal-500'}`}
                            />
                        </div>
                        <button className={`px-6 py-3 rounded-full border flex items-center gap-2 text-xs uppercase tracking-widest transition-colors ${theme === 'dark' ? 'border-neutral-700 text-white hover:bg-neutral-800' : 'border-neutral-200 text-black hover:bg-neutral-50'}`}>
                            <Navigation size={14}/> Use My Location
                        </button>
                    </div>

                    <div className="grid lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 space-y-4">
                            {filteredClinics.map((clinic) => (
                                <div key={clinic.id} onClick={() => setSelected(clinic)} className={`p-6 rounded-3xl cursor-pointer transition-all border ${selected?.id === clinic.id ? 'border-teal-500 shadow-md' : (theme === 'dark' ? 'border-neutral-800 bg-neutral-900 hover:bg-neutral-800' : 'border-neutral-200 bg-white hover:bg-neutral-50 shadow-sm')}`}>
                                    <div className="flex justify-between items-start">
                                        <div>
                                            <h3 className={`text-xl font-light ${theme === 'dark' ? 'text-white' : 'text-black'}`}>{clinic.name}</h3>
                                            <p className={`text-sm mt-1 ${theme === 'dark' ? 'text-neutral-400' : 'text-neutral-500'}`}>{clinic.address}</p>
                                            <div className="flex gap-2 mt-4">
                                                <span className={`text-[10px] uppercase tracking-widest px-2 py-1 rounded ${clinic.available ? 'bg-teal-500/20 text-teal-500' : 'bg-red-500/20 text-red-500'}`}>{clinic.available ? 'Available' : 'Full'}</span>
                                                <span className={`text-[10px] uppercase tracking-widest px-2 py-1 rounded ${theme === 'dark' ? 'bg-white/10 text-neutral-300' : 'bg-black/5 text-neutral-600'}`}>{clinic.type}</span>
                                                <span className="text-[10px] uppercase tracking-widest px-2 py-1 rounded bg-yellow-500/20 text-yellow-500 flex items-center gap-1"><CheckCircle size={10}/> {clinic.rating}</span>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <div className={`text-2xl font-light ${theme === 'dark' ? 'text-white' : 'text-black'}`}>{clinic.distance}</div>
                                            <div className={`text-[10px] uppercase tracking-widest ${theme === 'dark' ? 'text-neutral-500' : 'text-neutral-400'}`}>Distance</div>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className={`p-8 rounded-3xl h-fit sticky top-24 ${theme === 'dark' ? 'bg-neutral-900 border border-neutral-800' : 'bg-white border border-neutral-200 shadow-lg'}`}>
                            <h3 className={`text-xl font-light mb-6 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>Booking</h3>
                            {selected ? (
                                <div className="space-y-6">
                                    <div className="pb-4 border-b border-current border-opacity-10">
                                        <div className={`text-xs uppercase tracking-widest mb-1 ${theme === 'dark' ? 'text-neutral-500' : 'text-neutral-400'}`}>Location</div>
                                        <div className={`text-lg ${theme === 'dark' ? 'text-white' : 'text-black'}`}>{selected.name}</div>
                                    </div>
                                    <AmberInput label="Date" type="date" value={date} onChange={(e) => setDate(e.target.value)} theme={theme} />
                                    <AmberInput label="Time" type="time" value={time} onChange={(e) => setTime(e.target.value)} theme={theme} />
                                    <button onClick={handleBook} disabled={bookingState === 'processing' || !selected.available} className={`w-full py-4 rounded-full font-bold text-xs uppercase tracking-widest transition-transform active:scale-95 disabled:opacity-50 ${theme === 'dark' ? 'bg-white text-black hover:bg-neutral-200' : 'bg-black text-white hover:bg-neutral-800'}`}>
                                        {bookingState === 'processing' ? 'Confirming...' : (bookingState === 'success' ? 'Confirmed' : 'Confirm')}
                                    </button>
                                </div>
                            ) : (<div className="text-center opacity-50 py-12">Select a clinic location to proceed with booking.</div>)}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        function App() {
          const [loading, setLoading] = useState(true);
          const [theme, setTheme] = useState('dark');
          const [view, setView] = useState('home');
          const [user, setUser] = useState(null);
          
          const [notification, setNotification] = useState(null);
          const showMessage = (msg, type = 'success') => {
              setNotification({ msg, type });
              setTimeout(() => setNotification(null), 3000);
          };

          const [isSignUp, setIsSignUp] = useState(false);
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');

          const [patientName, setPatientName] = useState('');
          const [patientAge, setPatientAge] = useState('');
          const [patientWeight, setPatientWeight] = useState('');
          const [patientHeight, setPatientHeight] = useState('');
          const [conditions, setConditions] = useState('');
          const [medications, setMedications] = useState('');
          const [allergies, setAllergies] = useState('');
          const [goals, setGoals] = useState('');
          
          const [activityLevel, setActivityLevel] = useState('');
          const [eatingHabits, setEatingHabits] = useState('');
          const [foodPreferences, setFoodPreferences] = useState('');
          const [budget, setBudget] = useState('');
          
          const [clinicalFile, setClinicalFile] = useState(null);
          const [agreed, setAgreed] = useState(false);
          
          const [reports, setReports] = useState([]);
          const [currentReport, setCurrentReport] = useState(null);
          
          const [chatInput, setChatInput] = useState('');
          const [chatHistory, setChatHistory] = useState([{ role: 'ai', content: 'I am GuTek. How can I assist with your clinical protocol today?' }]);
          const [aiLoading, setAiLoading] = useState(false);

          const generateDemoData = async () => {
            if (!user) return;
            setLoading(true);
            const demoFiles = ["Clinical_Seq_A102.bam", "Patient_Ref_X99.pdf", "Lab_Results_B44.csv"];
            const demoNames = ["John Doe", "Alice Smith", "Robert Johnson", "Emily Davis"];
            const promises = [];
            
            for (let i = 0; i < 5; i++) {
              const keys = Object.keys(ENTEROTYPES);
              const randomKey = keys[Math.floor(Math.random() * keys.length)];
              const newReport = {
                enterotypeKey: randomKey,
                diversityScore: (Math.random() * (9.5 - 4.0) + 4.0).toFixed(1),
                fileName: demoFiles[Math.floor(Math.random() * demoFiles.length)],
                patientName: demoNames[Math.floor(Math.random() * demoNames.length)],
                patientAge: Math.floor(Math.random() * (75 - 25) + 25),
                patientWeight: Math.floor(Math.random() * (95 - 55) + 55),
                patientHeight: Math.floor(Math.random() * (190 - 155) + 155),
                conditions: "None", medications: "None", allergies: "None",
                activityLevel: "Moderate", eatingHabits: "Irregular", foodPreferences: "Standard",
                goals: "Health maintenance", budget: "Moderate",
                timestamp: serverTimestamp()
              };
              promises.push(addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'reports'), newReport));
            }
            try { await Promise.all(promises); showMessage('Demo data generated.'); } catch (e) { console.error(e); } finally { setLoading(false); }
          };

          useEffect(() => {
            const initAuth = async () => {
              try {
                  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                  } else {
                    await signInAnonymously(auth);
                  }
              } catch (e) { console.error(e); }
            };
            initAuth();
            return onAuthStateChanged(auth, setUser);
          }, []);

          useEffect(() => {
            if (!user || !db) return;
            const q = query(collection(db, 'artifacts', appId, 'users', user.uid, 'reports'));
            const unsubscribe = onSnapshot(q, (snapshot) => {
              const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
              // Sort memory array to avoid unindexed orderBy errors
              data.sort((a, b) => {
                  const ta = a.timestamp?.toMillis ? a.timestamp.toMillis() : 0;
                  const tb = b.timestamp?.toMillis ? b.timestamp.toMillis() : 0;
                  return tb - ta;
              });
              setReports(data);
            }, (error) => {
              console.error("Firestore Error:", error);
            });
            return () => unsubscribe();
          }, [user]);

          const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

          const calculateAlgorithm = () => {
              const dietaryText = (eatingHabits + " " + foodPreferences).toLowerCase();
              const clinicalText = (conditions + " " + medications + " " + allergies + " " + goals).toLowerCase();
              const lifestyleText = activityLevel.toLowerCase();
              
              let scores = { BACTEROIDES: 0, PREVOTELLA: 0, RUMINOCOCCUS: 0, AKKERMANSIA: 0, PROTEOBACTERIA: 0 };
              ['veg', 'plant', 'fruit', 'fiber'].forEach(k => { if(dietaryText.includes(k)) scores.PREVOTELLA += 2; });
              ['meat', 'sugar', 'fast', 'fry'].forEach(k => { if(dietaryText.includes(k)) scores.BACTEROIDES += 2; });
              ['ibs', 'bloat', 'dairy', 'gluten'].forEach(k => { if(clinicalText.includes(k) || dietaryText.includes(k)) scores.RUMINOCOCCUS += 3; }); 
              ['fast', 'keto', 'berry', 'weight'].forEach(k => { if(clinicalText.includes(k) || dietaryText.includes(k)) scores.AKKERMANSIA += 3; });
              ['stress', 'sibo', 'antibiotic', 'sugar'].forEach(k => { if(clinicalText.includes(k) || dietaryText.includes(k)) scores.PROTEOBACTERIA += 3; });

              if (Object.values(scores).every(v => v === 0)) scores.BACTEROIDES = 1; 
              const enterotypeKey = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);

              let diversity = 6.5; 
              if (['gym', 'run', 'sport', 'active'].some(k => lifestyleText.includes(k))) diversity += 1.2;
              if (['sedentary', 'sit', 'none'].some(k => lifestyleText.includes(k))) diversity -= 1.5;
              if (enterotypeKey === 'PROTEOBACTERIA') diversity -= 1.5;
              diversity = Math.min(Math.max(diversity, 1.5), 9.9).toFixed(1);

              return { enterotypeKey, diversity };
          };

          const handleAnalyze = async () => {
            if (!patientName || patientName.trim().length < 2) { showMessage('Please enter a valid Patient Name.', 'error'); return; }
            if (!patientAge || isNaN(Number(patientAge))) { showMessage('Please enter a valid Age.', 'error'); return; }
            if(!agreed) { showMessage('Compliance agreement is required to proceed.', 'error'); return; }
            
            setView('loading_analysis');
            const { enterotypeKey, diversity } = calculateAlgorithm();
            const predictedName = ENTEROTYPES[enterotypeKey].name;

            let aiInsight = "AI analysis pending...";
            try {
                aiInsight = await callGemini(`Patient Profile: Age ${patientAge}, Weight ${patientWeight}, Condition: ${conditions}. Predicted Enterotype: ${predictedName}. Generate a concise 2-sentence clinical insight.`);
            } catch(e) { console.error(e); }
            
            const newReport = {
                enterotypeKey, diversityScore: diversity, patientName: patientName || 'Guest',
                patientAge, patientWeight, patientHeight, conditions, medications, allergies, goals, activityLevel, eatingHabits, foodPreferences, budget, aiInsight, timestamp: serverTimestamp()
            };

            if(user) await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'reports'), newReport);
            setCurrentReport({ ...newReport, timestamp: { toDate: () => new Date() }, id: 'NEW' });
            setView('dashboard');
          };

          const handleChat = async (e) => {
              e.preventDefault();
              if(!chatInput.trim()) return;
              const newHistory = [...chatHistory, { role: 'user', content: chatInput }];
              setChatHistory(newHistory); setChatInput(''); setAiLoading(true);
              const response = await callGemini(chatInput);
              setChatHistory([...newHistory, { role: 'ai', content: response }]); setAiLoading(false);
          };

          const handleAuth = async (e) => {
              e.preventDefault(); setLoading(true);
              setTimeout(() => { setLoading(false); showMessage(isSignUp ? "Account created!" : "Logged in!"); setView('home'); }, 1500);
          };
          
          const handleExpertBook = async (expert) => {
              if(!user || user.isAnonymous) { showMessage('Login required', 'error'); return; }
              try {
                  await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'appointments'), { type: 'Expert Consult', expertName: expert.name, timestamp: serverTimestamp() });
                  showMessage('Booking Confirmed for ' + expert.name);
              } catch(e) { showMessage('Error booking appointment', 'error'); }
          };

          if (loading) return <AmberLoader onComplete={() => setLoading(false)} />;

          return (
            <div className={`min-h-screen transition-colors duration-700 font-sans selection:bg-teal-500 selection:text-white ${theme === 'dark' ? 'bg-black text-white' : 'bg-white text-black'}`}>
              
              {notification && (
                <div className={`fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest shadow-2xl z-50 animate-fadeIn transition-colors flex items-center gap-2 ${notification.type === 'error' ? 'bg-red-500 text-white' : 'bg-teal-500 text-white'}`}>
                    {notification.type === 'success' ? <CheckCircle size={14}/> : <AlertCircle size={14}/>}
                    {notification.msg}
                </div>
              )}

              <AmberNav view={view} setView={setView} theme={theme} user={user} />

              <main className="pt-20">
                
                {/* VIEW: HOME */}
                {view === 'home' && (
                  <div className="animate-fadeIn">
                    <section className={`relative h-[85vh] flex flex-col items-center justify-center overflow-hidden transition-colors duration-700 ${theme === 'dark' ? 'bg-neutral-900' : 'bg-neutral-100'}`}>
                      <div className="absolute inset-0 z-0 opacity-50"><HumanSystem3D theme={theme} /></div>
                      <div className="z-10 text-center space-y-6 px-4">
                        <div className="flex items-center justify-center gap-2 mb-4 animate-slideUp">
                           <span className="h-[1px] w-8 bg-current opacity-50"></span>
                           <span className="text-xs uppercase tracking-[0.2em] opacity-80">Modern Nutrition</span>
                           <span className="h-[1px] w-8 bg-current opacity-50"></span>
                        </div>
                        <h1 className="text-5xl md:text-7xl font-light tracking-tight leading-tight animate-slideUp delay-100">Where Health<br/>Belongs</h1>
                        <div className="pt-8 animate-slideUp delay-200">
                           <button onClick={() => setView('analyze')} className={`px-8 py-3 rounded-full text-sm font-medium tracking-wide transition-all hover:scale-105 ${theme === 'dark' ? 'bg-white text-black hover:bg-neutral-200' : 'bg-black text-white hover:bg-neutral-800'}`}>Explore Analysis</button>
                        </div>
                      </div>
                      <div className="absolute bottom-10 w-full px-10 flex justify-between items-end border-t border-current border-opacity-10 pt-6">
                         <div><h3 className="text-sm font-medium">System Environment</h3><p className="text-xs opacity-50 mt-1">Designed to adapt quietly to your bio-rhythm</p></div>
                         <div className="flex items-center gap-3"><span className="text-xs uppercase tracking-widest opacity-60">{theme === 'dark' ? 'Dark Mode' : 'Light Mode'}</span><AmberToggle theme={theme} toggle={toggleTheme} /></div>
                      </div>
                    </section>

                    <div className={`py-24 px-6 border-t ${theme === 'dark' ? 'border-neutral-800' : 'border-neutral-200'}`}>
                        <div className="max-w-6xl mx-auto">
                            <div className="text-center mb-16 animate-slideUp">
                                <h2 className={`text-3xl font-light mb-4 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>System Process Architecture</h2>
                                <p className="opacity-50 text-sm">End-to-end clinical data processing pipeline</p>
                            </div>
                            <div className="flex flex-col md:flex-row gap-12 md:gap-4 justify-between relative">
                                 <AmberFlowStep number={1} icon={FilePlus} title="Clinical Intake" desc="Ingestion of bio-metrics, history, and uploaded sequencing data." theme={theme} />
                                 <AmberFlowStep number={2} icon={Zap} title="NLP Analysis" desc="Natural language processing of lifestyle & dietary patterns." theme={theme} />
                                 <AmberFlowStep number={3} icon={Dna} title="Genomic Sync" desc="Bioinformatics pipeline aligns metagenomic sequences." theme={theme} />
                                 <AmberFlowStep number={4} icon={Cpu} title="Predictive Core" desc="Multi-variable algorithm calculates enterotype & risks." theme={theme} />
                                 <AmberFlowStep number={5} icon={FileText} title="Protocol Synth" desc="Generation of precision therapeutic nutrition plans." theme={theme} last={true} />
                            </div>
                        </div>
                    </div>

                    <section className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3">
                       <AmberGridItem title="New Protocol" subtitle="Start a fresh sequence" theme={theme} onClick={() => setView('analyze')} icon={Activity}/>
                       <AmberGridItem title="Expert Consult" subtitle="Book Specialists" theme={theme} onClick={() => setView('consult')} icon={Calendar}/>
                       <AmberGridItem title="Patient Records" subtitle="View database history" theme={theme} onClick={() => setView('history')} icon={Database}/>
                       <AmberGridItem title="Clinic Locator" subtitle="Find collection points" theme={theme} onClick={() => setView('clinics')} icon={MapPin}/>
                       <AmberGridItem title="Assistant" subtitle="Ask GuTek AI" theme={theme} onClick={() => setView('ask')} icon={Bot}/>
                       <AmberGridItem title="Research" subtitle="Latest publications" theme={theme} onClick={() => setView('research')} icon={FileText}/>
                    </section>
                  </div>
                )}

                {/* VIEW: LOGIN */}
                {view === 'login' && (
                    <div className="min-h-screen flex items-center justify-center px-6 animate-fadeIn">
                        <div className={`w-full max-w-md p-12 rounded-3xl border ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800' : 'bg-white border-neutral-200 shadow-xl'}`}>
                            <div className="text-center mb-10">
                                <h2 className={`text-3xl font-light mb-2 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>{isSignUp ? 'Create Account' : 'Welcome Back'}</h2>
                                <p className="text-sm opacity-50">Secure access to your clinical records</p>
                            </div>
                            <form onSubmit={handleAuth} className="space-y-6">
                                {isSignUp && (<AmberInput label="Full Name" placeholder="John Doe" theme={theme} />)}
                                <AmberInput label="Email Address" type="email" value={email} onChange={(e) => setEmail(e.target.value)} placeholder="doctor@clinic.com" theme={theme} />
                                <AmberInput label="Password" type="password" value={password} onChange={(e) => setPassword(e.target.value)} placeholder="••••••••" theme={theme} />
                                <button type="submit" className={`w-full py-4 rounded-full font-bold text-xs uppercase tracking-widest transition-transform active:scale-95 ${theme === 'dark' ? 'bg-white text-black hover:bg-neutral-200' : 'bg-black text-white hover:bg-neutral-800'}`}>
                                    {isSignUp ? 'Sign Up' : 'Sign In'}
                                </button>
                            </form>
                            <div className="mt-8 text-center">
                                <p className="text-xs opacity-50 mb-4">Or continue with</p>
                                <div className="flex justify-center gap-4 mb-8">
                                    <button className={`p-3 rounded-full border ${theme === 'dark' ? 'border-neutral-700 hover:bg-neutral-800' : 'border-neutral-200 hover:bg-neutral-50'}`}><Mail size={18}/></button>
                                    <button className={`p-3 rounded-full border ${theme === 'dark' ? 'border-neutral-700 hover:bg-neutral-800' : 'border-neutral-200 hover:bg-neutral-50'}`}><ShieldCheck size={18}/></button>
                                </div>
                                <button onClick={() => setIsSignUp(!isSignUp)} className={`text-xs font-bold uppercase tracking-widest border-b border-transparent hover:border-current transition-all ${theme === 'dark' ? 'text-white' : 'text-black'}`}>
                                    {isSignUp ? 'Already have an account? Sign In' : 'New User? Create Account'}
                                </button>
                            </div>
                        </div>
                    </div>
                )}

                {/* VIEW: CONTACT */}
                {view === 'contact' && (
                    <div className="min-h-screen pt-24 pb-12 px-6 animate-fadeIn">
                        <div className="max-w-4xl mx-auto">
                            <div className="text-center mb-16">
                                <h1 className={`text-4xl font-light mb-4 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>Contact Support</h1>
                                <p className="opacity-50">Technical assistance and clinical inquiries</p>
                            </div>
                            <div className="grid md:grid-cols-2 gap-12">
                                <div className={`p-8 rounded-3xl border space-y-8 ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800' : 'bg-white border-neutral-200 shadow-sm'}`}>
                                    <h3 className="text-xl font-light">Get in touch</h3>
                                    <form className="space-y-6" onSubmit={(e) => { e.preventDefault(); showMessage('Message sent!'); }}>
                                        <AmberInput label="Name" placeholder="Dr. Smith" theme={theme} />
                                        <AmberInput label="Email" type="email" placeholder="contact@example.com" theme={theme} />
                                        <AmberInput label="Subject" placeholder="Inquiry regarding..." theme={theme} />
                                        <AmberInput label="Message" type="textarea" placeholder="How can we help?" rows={5} theme={theme} />
                                        <button type="submit" className={`w-full py-4 rounded-full font-bold text-xs uppercase tracking-widest transition-transform active:scale-95 ${theme === 'dark' ? 'bg-white text-black hover:bg-neutral-200' : 'bg-black text-white hover:bg-neutral-800'}`}>Send Message</button>
                                    </form>
                                </div>
                                <div className="space-y-8">
                                    <div className={`p-8 rounded-3xl border ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800' : 'bg-white border-neutral-200'}`}>
                                        <h3 className="text-lg font-light mb-6">Headquarters</h3>
                                        <div className="space-y-4 text-sm opacity-70">
                                            <div className="flex items-start gap-4"><MapPin className="shrink-0" size={20}/><p>124 Science Park Drive,<br/>Genomics Block A,<br/>Singapore 118224</p></div>
                                            <div className="flex items-center gap-4"><Mail size={20}/><p>support@gutek-labs.com</p></div>
                                            <div className="flex items-center gap-4"><Stethoscope size={20}/><p>+65 6789 0123 (Clinical Hotline)</p></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* VIEW: ANALYZE */}
                {view === 'analyze' && (
                   <div className="min-h-screen flex flex-col items-center pt-24 pb-12 px-6 animate-fadeIn">
                      <div className="max-w-4xl w-full space-y-12">
                         <div className="text-center space-y-2">
                            <h2 className={`text-3xl font-light ${theme === 'dark' ? 'text-white' : 'text-black'}`}>Start Analysis</h2>
                            <p className="text-sm opacity-50">Upload biomarkers and define clinical context</p>
                         </div>
                         <div className={`p-12 rounded-3xl border ${theme === 'dark' ? 'border-neutral-800 bg-neutral-900' : 'border-neutral-200 bg-white shadow-lg'} space-y-12`}>
                            <div className="space-y-8">
                                <div className="grid md:grid-cols-2 gap-8">
                                    <AmberInput label="Patient Name / ID" value={patientName} onChange={(e) => setPatientName(e.target.value)} theme={theme} placeholder="Full Name" />
                                    <div className="grid grid-cols-3 gap-4">
                                        <AmberInput label="Age" value={patientAge} onChange={(e) => setPatientAge(e.target.value)} theme={theme} placeholder="Yrs" type="number" />
                                        <AmberInput label="Weight (kg)" value={patientWeight} onChange={(e) => setPatientWeight(e.target.value)} theme={theme} placeholder="kg" type="number" />
                                        <AmberInput label="Height (cm)" value={patientHeight} onChange={(e) => setPatientHeight(e.target.value)} theme={theme} placeholder="cm" type="number" />
                                    </div>
                                </div>
                                <div className="grid md:grid-cols-2 gap-8">
                                     <AmberInput label="Health Conditions" value={conditions} onChange={(e) => setConditions(e.target.value)} theme={theme} placeholder="e.g. T2D, IBS" />
                                     <AmberInput label="Medications" value={medications} onChange={(e) => setMedications(e.target.value)} theme={theme} placeholder="Current Rx" />
                                </div>
                                <div className="grid md:grid-cols-2 gap-8">
                                     <AmberInput label="Allergies & Intolerances" value={allergies} onChange={(e) => setAllergies(e.target.value)} theme={theme} placeholder="Gluten, Nuts..." />
                                </div>
                            </div>

                            <div className="space-y-8 pt-8 border-t border-current border-opacity-10">
                                <h4 className={`text-xl font-light flex items-center gap-2 ${theme === 'dark' ? 'text-white' : 'text-black'}`}><Dumbbell size={20} className="opacity-50" /> Lifestyle & Nutritional Profile</h4>
                                <AmberInput label="Physical Activity Level" value={activityLevel} onChange={(e) => setActivityLevel(e.target.value)} theme={theme} placeholder="e.g. Sedentary, Gym 3x/week" />
                                <div className="grid md:grid-cols-2 gap-8">
                                     <AmberInput label="Current Eating Habits" type="textarea" value={eatingHabits} onChange={(e) => setEatingHabits(e.target.value)} theme={theme} placeholder="Meals per day, timing..." />
                                     <AmberInput label="Food Preferences & Aversions" type="textarea" value={foodPreferences} onChange={(e) => setFoodPreferences(e.target.value)} theme={theme} placeholder="Likes, dislikes, cultural..." />
                                </div>
                            </div>

                            <div className="space-y-8 pt-8 border-t border-current border-opacity-10">
                                <h4 className={`text-xl font-light flex items-center gap-2 ${theme === 'dark' ? 'text-white' : 'text-black'}`}><Target size={20} className="opacity-50" /> Goals & Objectives</h4>
                                <div className="grid md:grid-cols-2 gap-8">
                                     <AmberInput label="Specific Health Goals" type="textarea" value={goals} onChange={(e) => setGoals(e.target.value)} theme={theme} placeholder="Weight loss, gut repair..." />
                                     <AmberInput label="Budget Considerations" value={budget} onChange={(e) => setBudget(e.target.value)} theme={theme} placeholder="Unrestricted, Moderate, Budget-conscious" />
                                </div>
                            </div>

                            <div className="relative pt-4">
                                <label className="text-xs uppercase tracking-wider font-bold opacity-60 mb-2 block">Clinical Data Source (Optional)</label>
                                <input type="file" className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onChange={(e) => setClinicalFile(e.target.files[0])} />
                                <div className={`w-full border-b p-4 flex items-center justify-between ${theme === 'dark' ? 'border-neutral-700 bg-black/20' : 'border-neutral-300 bg-neutral-50'} rounded-t-lg`}>
                                    <span className={`text-sm ${!clinicalFile && 'opacity-30'}`}>{clinicalFile ? clinicalFile.name : 'Upload PDF / FASTQ / BAM (Optional)'}</span><FilePlus size={20} className="opacity-50" />
                                </div>
                            </div>

                            <div className="pt-4 flex items-center gap-3">
                               <div onClick={() => setAgreed(!agreed)} className={`w-5 h-5 border flex items-center justify-center cursor-pointer transition-colors ${agreed ? (theme === 'dark' ? 'bg-white border-white' : 'bg-black border-black') : 'border-neutral-500'}`}>
                                  {agreed && <Check size={14} className={theme === 'dark' ? 'text-black' : 'text-white'} />}
                               </div>
                               <span className="text-xs opacity-60">I confirm this data is anonymized and compliant with HIPAA regulations.</span>
                            </div>

                            <button onClick={handleAnalyze} className={`w-full py-5 rounded-full font-bold tracking-widest text-xs uppercase transition-all ${agreed ? (theme === 'dark' ? 'bg-white text-black hover:bg-neutral-200' : 'bg-black text-white hover:bg-neutral-800') : 'opacity-50 cursor-not-allowed bg-neutral-500 text-white'}`}>
                               Generate Protocol
                            </button>
                         </div>
                      </div>
                   </div>
                )}
                
                {/* LOADING VIEW FOR ANALYSIS */}
                {view === 'loading_analysis' && (
                    <div className="min-h-[80vh] flex flex-col items-center justify-center animate-fadeIn">
                        <Dna size={48} className="text-teal-500 animate-spin-slow mb-6" />
                        <h2 className={`text-2xl font-light mb-2 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>Synthesizing Protocol</h2>
                        <p className="opacity-50 text-sm">Processing metagenomic inferences...</p>
                    </div>
                )}

                {/* VIEW: DASHBOARD / REPORT */}
                {view === 'dashboard' && currentReport && (
                   <div className="animate-fadeIn pb-24">
                      <div className={`h-[50vh] w-full relative flex items-center justify-center ${theme === 'dark' ? 'bg-neutral-900' : 'bg-neutral-100'}`}>
                         <div className="text-center space-y-4 z-10">
                            <span className="px-3 py-1 rounded-full border border-current text-xs uppercase tracking-widest opacity-60">Result</span>
                            <h1 className="text-4xl md:text-6xl font-light">{ENTEROTYPES[currentReport.enterotypeKey].name.split(':')[0]}</h1>
                            <p className={`text-2xl font-medium tracking-wide ${theme === 'dark' ? 'text-teal-400' : 'text-teal-600'}`}>{ENTEROTYPES[currentReport.enterotypeKey].name.split(':')[1]}</p>
                         </div>
                         <div className="absolute inset-0 opacity-20 pointer-events-none"><HumanSystem3D theme={theme} /></div>
                      </div>
                      <div className="max-w-6xl mx-auto px-6 -mt-20 relative z-20">
                         <div className={`rounded-3xl p-8 md:p-12 shadow-2xl space-y-12 ${theme === 'dark' ? 'bg-neutral-900 border border-neutral-800' : 'bg-white border border-neutral-100'}`}>
                            <div className="grid grid-cols-2 md:grid-cols-5 gap-8 border-b border-current border-opacity-10 pb-12">
                               <div><div className="text-xs uppercase tracking-widest opacity-50 mb-2">Diversity</div><div className="text-3xl font-light">{currentReport.diversityScore}</div></div>
                               <div><div className="text-xs uppercase tracking-widest opacity-50 mb-2">Patient</div><div className="text-xl font-light truncate">{currentReport.patientName}</div></div>
                               <div><div className="text-xs uppercase tracking-widest opacity-50 mb-2">Age</div><div className="text-xl font-light">{currentReport.patientAge || 'N/A'}</div></div>
                               <div><div className="text-xs uppercase tracking-widest opacity-50 mb-2">Weight</div><div className="text-xl font-light">{currentReport.patientWeight || 'N/A'}</div></div>
                               <div><div className="text-xs uppercase tracking-widest opacity-50 mb-2">Status</div><div className="text-xl font-light text-teal-500">Verified</div></div>
                            </div>
                            <AmberReportDetail report={currentReport} theme={theme} showMessage={showMessage} />
                         </div>
                      </div>
                   </div>
                )}
                
                {/* VIEW: CONSULT */}
                {view === 'consult' && (
                     <div className="max-w-5xl mx-auto pt-12 pb-24 px-6 animate-fadeIn">
                        <h2 className={`text-4xl font-light mb-12 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>Expert Consultation</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {EXPERTS_LIST.map((expert) => (
                                <div key={expert.id} className={`p-6 rounded-3xl flex flex-col gap-4 border ${theme === 'dark' ? 'border-neutral-800 bg-neutral-900' : 'border-neutral-200 bg-white shadow-sm'}`}>
                                    <div className="flex items-center gap-4">
                                        <img src={expert.image} className="w-16 h-16 rounded-full object-cover grayscale opacity-80" />
                                        <div><h3 className="text-lg font-light">{expert.name}</h3><p className="text-xs opacity-50">{expert.role}</p></div>
                                    </div>
                                    <div className="mt-auto pt-4 border-t border-current border-opacity-10">
                                        <p className="text-xs uppercase tracking-widest opacity-50 mb-4">{expert.speciality}</p>
                                        <button onClick={() => handleExpertBook(expert)} className={`w-full py-3 rounded-full text-xs font-bold uppercase tracking-widest transition-transform active:scale-95 ${theme === 'dark' ? 'bg-white/10 hover:bg-white/20' : 'bg-black/5 hover:bg-black/10'}`}>Book Session</button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                )}

                {/* VIEW: CLINICS */}
                {view === 'clinics' && <AmberClinicLocator theme={theme} user={user} showMessage={showMessage} />}

                {/* VIEW: ASK */}
                {view === 'ask' && (
                     <div className="max-w-3xl mx-auto pt-12 pb-24 px-6 animate-fadeIn h-[calc(100vh-80px)] flex flex-col">
                        <h2 className={`text-4xl font-light mb-8 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>GuTek Assistant</h2>
                        <div className={`flex-1 rounded-3xl p-6 mb-6 overflow-y-auto space-y-6 ${theme === 'dark' ? 'bg-neutral-900 border border-neutral-800' : 'bg-white border border-neutral-200 shadow-sm'}`}>
                             {chatHistory.map((msg, i) => (
                                 <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                     <div className={`max-w-[80%] p-4 rounded-2xl ${msg.role === 'user' ? (theme === 'dark' ? 'bg-white text-black' : 'bg-black text-white') : (theme === 'dark' ? 'bg-neutral-800' : 'bg-neutral-100')}`}>
                                         <p className="text-sm">{msg.content}</p>
                                     </div>
                                 </div>
                             ))}
                             {aiLoading && <div className="text-center opacity-50 text-xs animate-pulse">Thinking...</div>}
                        </div>
                        <form onSubmit={handleChat} className="relative">
                            <input value={chatInput} onChange={(e) => setChatInput(e.target.value)} placeholder="Inquire about protocols..." disabled={aiLoading} className={`w-full p-4 pr-16 rounded-full outline-none border ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800 focus:border-white' : 'bg-white border-neutral-200 focus:border-black'}`} />
                            <button type="submit" disabled={aiLoading || !chatInput} className="absolute right-2 top-2 p-2 rounded-full bg-teal-500 text-white disabled:opacity-50"><ArrowRight size={20}/></button>
                        </form>
                    </div>
                )}

                {/* VIEW: RESEARCH */}
                {view === 'research' && (
                   <div className="max-w-6xl mx-auto pt-12 pb-24 px-6 animate-fadeIn">
                      <div className="text-center mb-16"><h1 className={`text-4xl font-light mb-4 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>Research & Clinical Trials</h1><p className="opacity-50">Latest peer-reviewed publications from the GuTek Network</p></div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                          {RESEARCH_PAPERS.map((paper) => (
                              <div key={paper.id} onClick={() => showMessage(`Opening PDF access for: ${paper.title}`)} className={`p-8 rounded-3xl border transition-all hover:-translate-y-2 group cursor-pointer flex flex-col justify-between ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800 hover:border-teal-500' : 'bg-white border-neutral-200 shadow-sm hover:shadow-md'}`}>
                                  <div>
                                      <div className="flex justify-between items-start mb-6"><span className="text-[10px] uppercase tracking-widest px-3 py-1 rounded-full border border-current opacity-60">{paper.journal}</span><span className="text-xs opacity-50">{paper.date}</span></div>
                                      <h3 className={`text-2xl font-light mb-4 leading-tight group-hover:text-teal-500 transition-colors ${theme === 'dark' ? 'text-white' : 'text-black'}`}>{paper.title}</h3>
                                      <p className={`text-sm opacity-60 mb-6 leading-relaxed ${theme === 'dark' ? 'text-neutral-300' : 'text-neutral-600'}`}>{paper.abstract}</p>
                                  </div>
                                  <div>
                                      <div className="flex justify-between items-end border-t border-current border-opacity-10 pt-6">
                                          <div className="flex flex-col gap-1"><span className="text-[10px] uppercase tracking-widest opacity-50">Authors</span><span className="text-xs font-medium">{paper.authors}</span></div>
                                          <button className="p-3 rounded-full bg-teal-500 text-white opacity-0 group-hover:opacity-100 transition-opacity transform translate-x-4 group-hover:translate-x-0 duration-300"><ArrowRight size={16} /></button>
                                      </div>
                                      <div className="flex gap-2 mt-6 flex-wrap">
                                          {paper.tags.map((tag, i) => (<span key={i} className={`text-[10px] uppercase tracking-wide px-2 py-1 rounded ${theme === 'dark' ? 'bg-white/5 text-neutral-400' : 'bg-black/5 text-neutral-600'}`}>#{tag}</span>))}
                                      </div>
                                  </div>
                              </div>
                          ))}
                      </div>
                   </div>
                )}

                {/* VIEW: HISTORY */}
                {view === 'history' && (
                   <div className="max-w-[1400px] mx-auto pt-12 px-6 animate-fadeIn">
                      <div className="flex flex-col md:flex-row justify-between items-end mb-12 gap-4">
                          <h1 className={`text-4xl font-light ${theme === 'dark' ? 'text-white' : 'text-black'}`}>Patient Database</h1>
                          <button onClick={generateDemoData} className={`px-6 py-3 text-xs font-bold uppercase tracking-widest border rounded-full transition-all hover:scale-105 ${theme === 'dark' ? 'border-neutral-800 text-neutral-400 hover:text-white hover:border-white' : 'border-neutral-300 text-neutral-500 hover:text-black hover:border-black'}`}>+ Generate Demo Data</button>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                         {reports.map((report) => (
                            <div key={report.id} onClick={() => { setCurrentReport(report); setView('dashboard'); }} className={`aspect-[4/5] p-6 flex flex-col justify-between cursor-pointer transition-all hover:-translate-y-2 ${theme === 'dark' ? 'bg-neutral-900 hover:bg-neutral-800' : 'bg-neutral-100 hover:bg-neutral-200'}`}>
                               <div className="space-y-2">
                                  <span className="text-xs uppercase tracking-widest opacity-50">{report.timestamp?.toDate ? report.timestamp.toDate().toLocaleDateString() : 'Just now'}</span>
                                  <h3 className="text-xl">{report.patientName}</h3>
                               </div>
                               <div>
                                  <div className="text-3xl font-light mb-1">{report.diversityScore}</div><div className="text-xs uppercase tracking-widest opacity-50">Diversity Index</div>
                               </div>
                               <div className="pt-4 border-t border-current border-opacity-10 flex justify-between items-end">
                                  <span className="text-sm opacity-70">{ENTEROTYPES[report.enterotypeKey]?.name.split(':')[0]}</span><ArrowRight size={16} />
                               </div>
                            </div>
                         ))}
                         {reports.length === 0 && <div className="col-span-full py-24 text-center opacity-50"><Database size={48} className="mx-auto mb-4" /><p>No records found.</p></div>}
                      </div>
                   </div>
                )}
              </main>

              <style>{`
                .delay-100 { animation-delay: 100ms; }
                .delay-200 { animation-delay: 200ms; }
                .animate-spin-slow { animation: spin 3s linear infinite; }
                @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                .animate-fadeIn { animation: fadeIn 1s ease-out forwards; }
                @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
                .animate-slideUp { animation: slideUp 0.8s ease-out forwards; }
              `}</style>
            </div>
          );
        }

        export default App;

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
