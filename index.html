        const HumanSystem3D = ({ theme }) => {
          const mountRef = useRef(null);
          useEffect(() => {
            if (!mountRef.current || !window.THREE) return;
            const THREE = window.THREE;
            
            let animationFrameId;
            const width = mountRef.current.clientWidth;
            const height = mountRef.current.clientHeight;

            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.z = 22;

            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(width, height);
            renderer.setPixelRatio(window.devicePixelRatio);
            mountRef.current.appendChild(renderer.domElement);

            const isDark = theme === 'dark';
            const accentColor = isDark ? 0x2dd4bf : 0x0f766e; 

            const ambientLight = new THREE.AmbientLight(isDark ? 0xffffff : 0x111827, 0.5);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(accentColor, 2, 50);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);
            
            const systemGroup = new THREE.Group();
            scene.add(systemGroup);

            const material = new THREE.MeshPhongMaterial({
              color: accentColor,
              shininess: 100,
              wireframe: false,
              transparent: true,
              opacity: 0.9
            });

            const geo = new THREE.IcosahedronGeometry(4, 1);
            const mesh = new THREE.Mesh(geo, material);
            systemGroup.add(mesh);

            const ringGeo = new THREE.TorusGeometry(6, 0.05, 16, 100);
            const ringMat = new THREE.MeshBasicMaterial({ color: isDark ? 0xffffff : 0x000000, transparent: true, opacity: 0.3 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            systemGroup.add(ring);

            const animate = () => {
              animationFrameId = requestAnimationFrame(animate);
              systemGroup.rotation.y += 0.005;
              systemGroup.rotation.x += 0.002;
              mesh.scale.setScalar(1 + Math.sin(Date.now() * 0.001) * 0.05);
              renderer.render(scene, camera);
            };
            animate();

            const handleResize = () => {
                if(mountRef.current && renderer && camera) {
                   const width = mountRef.current.clientWidth;
                   const height = mountRef.current.clientHeight;
                   camera.aspect = width / height;
                   camera.updateProjectionMatrix();

                }
            };
            window.addEventListener('resize', handleResize);

            return () => {
              window.removeEventListener('resize', handleResize);
              if(mountRef.current && renderer) mountRef.current.removeChild(renderer.domElement);
              cancelAnimationFrame(animationFrameId);
            };
          }, [theme]);

          return <div ref={mountRef} className="w-full h-full" />;

            <div className="max-w-[1400px] mx-auto px-6 h-20 flex items-center justify-between">
              <div onClick={() => setView('home')} className="text-xl font-bold tracking-widest cursor-pointer flex-shrink-0">GUTEK</div>
              
              <div className="hidden md:flex gap-4 lg:gap-6 xl:gap-8 text-sm font-medium tracking-wide justify-center flex-1 px-4">
                {['Home', 'Analyze', 'Consult', 'Clinics', 'History', 'Ask', 'Research', 'Contact'].map((item) => (
                  <button key={item} onClick={() => setView(item.toLowerCase())} className={`hover:opacity-60 transition-opacity uppercase text-xs font-bold ${view === item.toLowerCase() ? 'opacity-100 border-b-2 border-current' : 'opacity-60'}`}>
                    {item}
                  </button>
                ))}
              </div>
              
              <div className="flex items-center gap-6 flex-shrink-0">
                <button onClick={() => setView('ask')} className="hover:opacity-60 transition-opacity relative"><ShoppingBag size={18} /><span className="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full"></span></button>
                <button onClick={() => setView('login')} className="flex items-center gap-2 hover:opacity-60 transition-opacity">
                    <User size={18} />
                    <span className="text-xs uppercase font-bold hidden md:block">{user && !user.isAnonymous ? 'Profile' : 'Login'}</span>
                </button>
              </div>
            </div>
          </nav>
        );

        const AmberGridItem = ({ title, subtitle, onClick, theme, icon: Icon }) => (
          <div onClick={onClick} className={`group relative aspect-square flex flex-col justify-between p-8 cursor-pointer overflow-hidden transition-colors duration-500 ${theme === 'dark' ? 'bg-neutral-900 hover:bg-neutral-800' : 'bg-neutral-100 hover:bg-neutral-200'}`}>
            <div className="z-10 transition-transform duration-500 group-hover:-translate-y-2">
              <h3 className={`text-2xl font-light mb-2 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>{title}</h3>
              <p className={`text-sm opacity-60 font-medium ${theme === 'dark' ? 'text-white' : 'text-black'}`}>{subtitle}</p>
            </div>
            <div className="absolute inset-0 flex items-center justify-center opacity-80 group-hover:opacity-100 group-hover:scale-105 transition-all duration-700">
               <div className={`w-32 h-32 rounded-full blur-2xl opacity-40 ${theme === 'dark' ? 'bg-teal-500' : 'bg-teal-300'}`}></div>
               {Icon && <Icon size={64} className={`absolute opacity-20 group-hover:opacity-40 transition-opacity ${theme === 'dark' ? 'text-teal-200' : 'text-teal-800'}`}/>}
            </div>
            <div className={`z-10 flex justify-between items-end opacity-0 group-hover:opacity-100 transition-opacity duration-500 translate-y-4 group-hover:translate-y-0 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>
               <span className="text-xs uppercase tracking-widest font-bold">View</span>
               <ArrowRight size={18} />
            </div>
          </div>
        );

        const AmberInput = ({ label, value, onChange, placeholder, theme, type = "text", rows }) => (
          <div>
            <label className={`text-xs uppercase tracking-wider font-bold mb-2 block ${theme === 'dark' ? 'text-neutral-400' : 'text-neutral-500'}`}>{label}</label>
            {type === 'textarea' ? (
              <textarea 
                value={value} 
                onChange={onChange}
                rows={rows || 3}
                className={`w-full bg-transparent border-b p-3 outline-none transition-colors resize-none
                  ${theme === 'dark' ? 'border-neutral-700 focus:border-white text-white placeholder-neutral-600' : 'border-neutral-300 focus:border-black text-black placeholder-neutral-400'}`}
                placeholder={placeholder}
              />
            ) : (
              <input 
                type={type}
                value={value} 
                onChange={onChange}
                className={`w-full bg-transparent border-b p-3 outline-none transition-colors 
                  ${theme === 'dark' ? 'border-neutral-700 focus:border-white text-white placeholder-neutral-600' : 'border-neutral-300 focus:border-black text-black placeholder-neutral-400'}`}
                placeholder={placeholder}
              />
            )}
          </div>
        );

        const AmberTaxaChart = ({ data, theme }) => (
            <div className="w-full">
                <div className="h-2 w-full flex rounded-full overflow-hidden mb-4">
                    {data.map((item, i) => (
                        <div key={i} style={{ width: `${item.value}%`, backgroundColor: i === 0 ? '#0d9488' : i === 1 ? '#2dd4bf' : i === 2 ? '#99f6e4' : '#e2e8f0' }}></div>
                    ))}
                </div>
                <div className="grid grid-cols-2 gap-4">
                    {data.map((item, i) => (
                        <div key={i} className="flex justify-between items-center text-xs">
                            <div className="flex items-center gap-2">
                                <div className={`w-2 h-2 rounded-full`} style={{ backgroundColor: i === 0 ? '#0d9488' : i === 1 ? '#2dd4bf' : i === 2 ? '#99f6e4' : '#e2e8f0' }}></div>
                                <span className={`font-medium ${theme === 'dark' ? 'text-neutral-300' : 'text-neutral-700'}`}>{item.label}</span>
                            </div>
                            <span className={`font-mono font-bold ${theme === 'dark' ? 'text-neutral-400' : 'text-neutral-600'}`}>{item.value}%</span>
                        </div>
                    ))}
                </div>
            </div>
        );

        const AmberFlowStep = ({ number, icon: Icon, title, desc, last = false, theme }) => (
          <div className="relative flex flex-col items-center flex-1 group">
            <div className={`w-16 h-16 rounded-full flex items-center justify-center mb-4 transition-all duration-500 border ${theme === 'dark' ? 'border-neutral-800 bg-neutral-900 group-hover:border-teal-500 group-hover:text-teal-500' : 'border-neutral-200 bg-white group-hover:border-teal-600 group-hover:text-teal-600'}`}>
              <Icon size={24} />
            </div>
            <div className="text-center px-2">
              <div className={`text-[10px] font-bold uppercase tracking-widest mb-2 opacity-50 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>Step 0{number}</div>
              <h3 className={`text-sm font-medium mb-1 ${theme === 'dark' ? 'text-white' : 'text-black'}`}>{title}</h3>
              <p className={`text-[10px] opacity-60 leading-relaxed ${theme === 'dark' ? 'text-white' : 'text-black'}`}>{desc}</p>
            </div>
            {!last && (
              <div className={`hidden md:block absolute top-8 left-[60%] w-[calc(100%-40%)] h-[1px] -z-10 opacity-20 ${theme === 'dark' ? 'bg-white' : 'bg-black'}`}></div>
            )}
          </div>
        );

        // --- Major Views ---
        const AmberReportDetail = ({ report, theme, showMessage }) => {
            const [genRecipe, setGenRecipe] = useState(null);
            const [loadingRecipe, setLoadingRecipe] = useState(false);

            if (!report || !ENTEROTYPES[report.enterotypeKey]) return null;
            const data = ENTEROTYPES[report.enterotypeKey];

            const handleShare = async () => {
                const textToShare = `GUTEK CLINICAL REPORT\nPatient: ${report.patientName}\nEnterotype: ${data.name}\nDiversity Score: ${report.diversityScore}\nProtocol: ${data.mealPlan}\n\nVisit GuTek for your full personalized analysis.`;
                if (navigator.share) {
                    try {
                        await navigator.share({ title: 'GuTek Clinical Report', text: textToShare });
                        showMessage('Shared successfully!');
                    } catch (err) {
                        if (err.name !== 'AbortError') copyToClipboard(textToShare);
                    }
                } else {
                    copyToClipboard(textToShare);
                }
            };

            const copyToClipboard = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    const successful = document.execCommand('copy');
                    if(successful) showMessage('Report summary copied to clipboard!');
                    else showMessage('Unable to copy report.', 'error');
                } catch (err) {
                    showMessage('Error copying to clipboard.', 'error');
                }
                document.body.removeChild(textArea);
            };

            const downloadProtocol = () => {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const width = 1200;
                const height = 4000; 
                canvas.width = width;
                canvas.height = height;

                const bg = '#ffffff';
                const teal = '#0d9488';
                const darkText = '#1f2937';
                const lightText = '#4b5563';
                const border = '#e5e7eb';
                const redText = '#dc2626';

                const wrapText = (text, x, y, maxWidth, lineHeight, font = '24px sans-serif', color = darkText) => {
                    ctx.font = font;
                    ctx.fillStyle = color;
                    const words = text.split(' ');
                    let line = '';
                    for(let n = 0; n < words.length; n++) {
                      const testLine = line + words[n] + ' ';
                      const metrics = ctx.measureText(testLine);
                      if (metrics.width > maxWidth && n > 0) {
                        ctx.fillText(line, x, y);
                        line = words[n] + ' ';
                        y += lineHeight;
                      } else {
                        line = testLine;
                      }
                    }
                    ctx.fillText(line, x, y);
                    return y + lineHeight;
                };

                const drawSectionTitle = (title, y) => {
                    ctx.fillStyle = teal; ctx.font = 'bold 32px sans-serif'; ctx.fillText(title, 60, y); return y + 50;
                };
                
                const drawItem = (label, value, y, indent = 0) => {
                     ctx.fillStyle = darkText; ctx.font = 'bold 24px sans-serif'; ctx.fillText(label, 60 + indent, y);
                     if(value) {
                         ctx.fillStyle = lightText; ctx.font = '24px sans-serif';
                         const metrics = ctx.measureText(label);
                         ctx.fillText(value, 60 + indent + metrics.width + 15, y);
                     }
                     return y + 40;
                };

                ctx.fillStyle = bg; ctx.fillRect(0, 0, width, height);
                ctx.fillStyle = teal; ctx.fillRect(0, 0, width, 160);
                ctx.fillStyle = '#ffffff'; ctx.font = 'bold 60px sans-serif'; ctx.fillText('GUTEK CLINICAL REPORT', 60, 100);
                
                let y = 240;
                ctx.font = 'bold 28px sans-serif'; ctx.fillStyle = darkText; ctx.fillText(`Patient: ${report.patientName}`, 60, y);
                ctx.fillText(`Date: ${new Date().toLocaleDateString()}`, 800, y); y += 40;
                ctx.font = '24px sans-serif'; ctx.fillStyle = lightText; ctx.fillText(`ID: ${report.id || 'PENDING'}`, 60, y);
                ctx.fillText(`Diversity Score: ${report.diversityScore}`, 800, y); y += 60;

                ctx.strokeStyle = border; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(60, y); ctx.lineTo(width - 60, y); ctx.stroke(); y += 60;

                y = drawSectionTitle(`1. Diagnosis: ${data.name}`, y);
                y = wrapText(data.description, 60, y, width - 120, 40, '24px sans-serif', lightText); y += 40;

                y = drawSectionTitle('2. Integrated Clinical Context & Biomarkers', y);
                if(report.conditions) y = drawItem('Conditions:', report.conditions, y);
                if(report.allergies) y = drawItem('Allergies:', report.allergies, y);
                if(report.goals) y = drawItem('Goals:', report.goals, y);
                y += 20;
                ctx.fillStyle = teal; ctx.font = 'bold 26px sans-serif'; ctx.fillText('Biomarker Panel (Simulated):', 60, y); y += 40;
                data.biomarkers.forEach(b => { y = drawItem(`• ${b.name}:`, `${b.value} (${b.status})`, y, 20); }); y += 40;

                y = drawSectionTitle('3. Associated Health Risks & Disease', y);
                ctx.fillStyle = '#fef2f2'; ctx.fillRect(60, y, width - 120, data.risks.length * 45 + 20);
                ctx.strokeStyle = '#fecaca'; ctx.strokeRect(60, y, width - 120, data.risks.length * 45 + 20); y += 40;
                data.risks.forEach(risk => { ctx.fillStyle = redText; ctx.font = 'bold 24px sans-serif'; ctx.fillText(`• ${risk}`, 90, y); y += 40; }); y += 40;

                y = drawSectionTitle('4. Therapeutic Foods', y);
                data.recommendations.increase.forEach(item => { y = drawItem(`• ${item.item}`, `(${item.amount}) - ${item.detail}`, y, 20); }); y += 20;
                
                y = drawSectionTitle('5. Contraindicated & Restricted Items', y);
                data.recommendations.avoid.forEach(item => { y = drawItem(`• ${item.item}`, `- ${item.detail}`, y, 20); }); y += 40;

                y = drawSectionTitle('6. Produce Prescription & Optimization', y);
                y = wrapText(`Optimization Strategy: ${data.recommendations.produceStrategy}`, 60, y, width - 120, 35, 'italic 24px sans-serif', darkText); y += 30;
                ctx.font = 'bold 26px sans-serif'; ctx.fillStyle = teal; ctx.fillText('Vegetables', 80, y); ctx.fillText('Fruits', 600, y); y += 40;
                
                const maxProduce = Math.max(data.recommendations.vegetables.length, data.recommendations.fruits.length);
                for(let i=0; i<maxProduce; i++) {
                     const v = data.recommendations.vegetables[i]; const f = data.recommendations.fruits[i];
                     ctx.font = '24px sans-serif'; ctx.fillStyle = darkText;
                     if(v) ctx.fillText(`• ${v.item} (${v.amount})`, 80, y);
                     if(f) ctx.fillText(`• ${f.item} (${f.amount})`, 600, y);
                     y += 40;
                } y += 40;

                y = drawSectionTitle('7. Daily Metabolic Schedule', y);
                Object.entries(data.dailyRoutine).forEach(([time, meal]) => { y = drawItem(time.replace(/([A-Z])/g, ' $1').trim().toUpperCase() + ':', meal, y, 20); }); y += 40;

                y = drawSectionTitle('8. Suggested Recipes', y);
                data.recipes.forEach(r => {
                     ctx.fillStyle = darkText; ctx.font = 'bold 24px sans-serif'; ctx.fillText(r.name, 80, y);
                     ctx.font = 'italic 22px sans-serif'; ctx.fillStyle = lightText; ctx.fillText(`(${r.time})`, 400, y); y += 35;
                     y = wrapText(r.instructions, 80, y, width - 160, 30, '22px sans-serif', lightText); y += 20;
                     ctx.font = '20px sans-serif'; ctx.fillStyle = teal; ctx.fillText(`Ingredients: ${r.ingredients.join(', ')}`, 80, y); y += 50;
                }); y += 20;

                y = drawSectionTitle('9. Supplements & Micronutrients', y);
                data.recommendations.supplements.forEach(s => { y = drawItem(`• ${s.item}`, s.detail, y, 20); });
                 data.recommendations.micronutrients.forEach(m => { y = drawItem(`• ${m.item}`, m.detail, y, 20); }); y += 60;
                
                y = drawSectionTitle('10. Lifestyle & Behavioral Optimization', y);
                data.recommendations.lifestyle.forEach(l => { y = drawItem(`• ${l.item}`, `${l.amount} - ${l.detail}`, y, 20); }); y += 60;

                ctx.fillStyle = '#fef2f2'; ctx.fillRect(60, y, width - 120, 150); ctx.strokeStyle = '#fecaca'; ctx.strokeRect(60, y, width - 120, 150);
                ctx.fillStyle = '#dc2626'; ctx.font = 'bold 24px sans-serif'; ctx.fillText('MEDICAL DISCLAIMER:', 90, y + 50);
                ctx.fillStyle = '#7f1d1d'; ctx.font = '20px sans-serif';
                y = wrapText('This report is generated by AI for informational purposes only and does not constitute medical advice. Please consult with a qualified healthcare professional or doctor before making significant changes to your diet, medication, or lifestyle.', 90, y + 90, width - 180, 30, '20px sans-serif', '#7f1d1d');

                const finalCanvas = document.createElement('canvas');
                finalCanvas.width = width; finalCanvas.height = y + 100;
                const finalCtx = finalCanvas.getContext('2d'); finalCtx.drawImage(canvas, 0, 0);

                const url = finalCanvas.toDataURL('image/png');
                const a = document.createElement('a'); a.href = url; a.download = `GuTek_Full_Report_${report.patientName.replace(/\s+/g,'_')}.png`; a.click();
            };

            const handleGenRecipe = async () => {
                setLoadingRecipe(true);
                const prompt = `Create a unique, healthy recipe tailored for Enterotype: ${data.name}. 
                The patient has these allergies/restrictions: ${report.allergies}. 
                Their goal is: ${report.goals}. 
                Please provide the response in this format: Recipe Name | Prep Time | Ingredients List (comma separated) | Brief Instructions. Keep it concise.`;
                
                const response = await callGemini(prompt, "You are a Michelin-star clinical nutritionist chef.");
                const parts = response.split('|').map(s => s.trim());
                if (parts.length >= 4) {
                    setGenRecipe({ name: parts[0], time: parts[1], ingredients: parts[2].split(',').map(i => i.trim()), instructions: parts[3] });
                } else {
                     setGenRecipe({ name: "AI Chef Special", time: "20 mins", ingredients: ["Seasonal Greens", "Olive Oil", "Lean Protein"], instructions: response });
                }
                setLoadingRecipe(false);
            };

            return (
                <div className="space-y-6 relative">
                    <div className={`p-6 rounded-3xl border flex flex-col md:flex-row justify-between items-start md:items-center gap-4 ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800' : 'bg-white border-neutral-200'}`}>
                        <div>
                            <div className={`text-xs uppercase tracking-widest opacity-50 mb-1`}>Patient Profile</div>
                            <div className="text-2xl font-light">{report.patientName}</div>
                            <div className="flex gap-4 mt-2 text-sm opacity-70">
                                <span>ID: {report.id?.slice(0,8) || 'PENDING'}</span>
                                <span>|</span><span>{report.patientAge} yrs</span>
                                <span>|</span><span>{report.patientWeight} kg</span>
                                <span>|</span><span>{new Date().toLocaleDateString()}</span>
                            </div>
                        </div>
                        <div className="flex gap-2">
                             <span className={`px-3 py-1 rounded text-xs font-bold uppercase tracking-widest ${theme === 'dark' ? 'bg-teal-900 text-teal-300' : 'bg-teal-100 text-teal-800'}`}>Verified Analysis</span>
                        </div>
                    </div>

                    <div className="grid md:grid-cols-3 gap-6">
                        <div className={`md:col-span-1 p-6 rounded-3xl border flex flex-col justify-between ${theme === 'dark' ? 'bg-neutral-800 border-neutral-700' : 'bg-white border-neutral-200'}`}>
                            <div>
                                <div className="text-xs uppercase tracking-widest opacity-50 mb-4">Enterotype</div>
                                <div className="text-3xl font-light text-teal-500 mb-2">{data.name.split(':')[1]}</div>
                                <div className="text-xs opacity-70 leading-relaxed">{data.description}</div>
                            </div>
                            <div className="mt-6 pt-6 border-t border-dashed border-current border-opacity-20"><AmberTaxaChart data={data.chartData} theme={theme} /></div>
                        </div>

                        <div className={`md:col-span-1 p-6 rounded-3xl border ${theme === 'dark' ? 'bg-neutral-800 border-neutral-700' : 'bg-white border-neutral-200'}`}>
                            <div className="text-xs uppercase tracking-widest opacity-50 mb-4">Diversity Index</div>
                            <div className="flex items-end gap-2 mb-4"><span className="text-5xl font-light">{report.diversityScore}</span><span className="text-sm opacity-50 mb-1">/ 10.0</span></div>
                            <div className={`w-full h-2 rounded-full overflow-hidden mb-6 ${theme === 'dark' ? 'bg-neutral-700' : 'bg-neutral-100'}`}>
                                <div className="h-full bg-gradient-to-r from-red-500 via-yellow-500 to-teal-500" style={{ width: `${(report.diversityScore / 10) * 100}%` }}></div>
                            </div>
                            <div className="space-y-2">
                                {data.biomarkers.map((b, i) => (
                                    <div key={i} className="flex justify-between text-xs">
                                        <span className="opacity-70">{b.name}</span>
                                        <span className={b.status === 'Optimal' || b.status === 'Normal' ? 'text-teal-500' : 'text-orange-500'}>{b.value}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className={`md:col-span-1 p-6 rounded-3xl border flex flex-col ${theme === 'dark' ? 'bg-teal-900/10 border-teal-800' : 'bg-teal-50 border-teal-100'}`}>
                            <div className="flex items-center gap-2 text-teal-500 font-bold text-xs uppercase tracking-widest mb-4"><Sparkles size={14}/> AI Clinical Insight</div>
                            <p className={`text-sm leading-relaxed flex-grow ${theme === 'dark' ? 'text-teal-100' : 'text-teal-900'}`}>{report.aiInsight || "Analyzing unique metabolic fingerprint..."}</p>
                        </div>
                    </div>

                    <div className={`p-8 rounded-3xl border ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800' : 'bg-white border-neutral-200'}`}>
                        <h4 className="text-xl font-light mb-6">Clinical Context</h4>
                        <div className="grid md:grid-cols-2 gap-8">
                            <div className="space-y-4">
                                <div className="flex justify-between py-3 border-b border-current border-opacity-10"><span className="text-sm opacity-60">Primary Goal</span><span className="text-sm font-medium">{report.goals}</span></div>
                                <div className="flex justify-between py-3 border-b border-current border-opacity-10"><span className="text-sm opacity-60">Diagnosed Conditions</span><span className="text-sm font-medium">{report.conditions}</span></div>
                                <div className="flex justify-between py-3 border-b border-current border-opacity-10"><span className="text-sm opacity-60">Allergies / Sensitivities</span><span className="text-sm font-medium text-red-400">{report.allergies}</span></div>
                            </div>
                            <div>
                                <h5 className="text-xs uppercase tracking-widest opacity-50 mb-4 flex items-center gap-2"><AlertCircle size={14}/> Risk Profile</h5>
                                <div className="grid grid-cols-1 gap-2">
                                    {data.risks.map((risk, i) => (
                                        <div key={i} className={`p-3 rounded border flex items-center gap-3 ${theme === 'dark' ? 'bg-red-900/10 border-red-900/30 text-red-200' : 'bg-red-50 border-red-100 text-red-800'}`}>
                                            <div className="w-1.5 h-1.5 rounded-full bg-red-500"></div><span className="text-sm">{risk}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid lg:grid-cols-12 gap-6">
                        <div className="lg:col-span-8 space-y-6">
                            <div className={`p-8 rounded-3xl border ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800' : 'bg-white border-neutral-200'}`}>
                                <div className="flex items-center justify-between mb-6">
                                    <h4 className="text-xl font-light">Nutritional Protocol</h4>
                                    <span className={`text-xs px-2 py-1 rounded border ${theme === 'dark' ? 'border-teal-500 text-teal-500' : 'border-teal-600 text-teal-600'}`}>{data.mealPlan}</span>
                                </div>
                                <div className="grid md:grid-cols-2 gap-8 mb-8">
                                    <div>
                                        <h5 className="text-xs font-bold uppercase tracking-widest text-teal-500 mb-4">Therapeutic Focus</h5>
                                        <ul className="space-y-3">
                                            {data.recommendations.increase.map((item, i) => (
                                                <li key={i} className="flex justify-between items-start text-sm pb-2 border-b border-current border-opacity-10">
                                                    <span>{item.item}</span><span className="opacity-50 text-xs">{item.amount}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                    <div>
                                        <h5 className="text-xs font-bold uppercase tracking-widest text-red-400 mb-4">Contraindicated</h5>
                                        <ul className="space-y-3">
                                            {data.recommendations.avoid.map((item, i) => (
                                                <li key={i} className="flex justify-between items-start text-sm pb-2 border-b border-current border-opacity-10">
                                                    <span>{item.item}</span><span className="opacity-50 text-xs text-right">{item.detail}</span>
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                </div>
                                <div className={`p-4 rounded-xl flex gap-4 ${theme === 'dark' ? 'bg-teal-900/10' : 'bg-teal-50'}`}>
                                    <div className="shrink-0 pt-1 text-teal-500"><Leaf size={20}/></div>
                                    <div>
                                        <h6 className="font-bold text-xs uppercase tracking-widest mb-1 text-teal-500">Produce Optimization Strategy</h6>
                                        <p className="text-sm opacity-80 italic">"{data.recommendations.produceStrategy}"</p>
                                    </div>
                                </div>
                            </div>
                            <div className={`p-8 rounded-3xl border ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800' : 'bg-white border-neutral-200'}`}>
                                <h4 className="text-xl font-light mb-6">Daily Schedule</h4>
                                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">

                            <div className={`p-6 rounded-3xl border ${theme === 'dark' ? 'bg-neutral-900 border-neutral-800' : 'bg-white border-neutral-200'}`}>

                                    {data.recipes.map((r,i) => (
                                        <div key={i} className="text-sm pb-3 border-b border-current border-opacity-10 last:border-0"><div className="font-bold">{r.name}</div><div className="text-xs opacity-50 mt-1">{r.time} • {r.ingredients.length} ingredients</div></div>

                                    {loadingRecipe && (
                                        <div className="py-4 text-center animate-pulse border-t border-dashed border-current border-opacity-10 mt-2">
                                            <Sparkles size={16} className="mx-auto mb-2 text-teal-500 animate-spin-slow"/><div className="text-xs font-bold uppercase tracking-widest text-teal-500 mb-1">Consulting Chef AI</div><div className="text-[10px] opacity-50">Designing metabolic meal...</div>
                                        </div>
                                    )}
                                    {genRecipe && !loadingRecipe && (
                                        <div className={`p-4 rounded-xl border mt-2 animate-fadeIn ${theme === 'dark' ? 'bg-teal-900/20 border-teal-800' : 'bg-teal-50 border-teal-100'}`}>
                                            <div className="flex justify-between items-start mb-2"><div className="font-bold text-sm text-teal-500">{genRecipe.name}</div><div className="text-[10px] opacity-60 bg-teal-500/10 px-2 py-1 rounded">{genRecipe.time}</div></div>
                                            <p className="text-xs opacity-80 mb-3 italic leading-relaxed">"{genRecipe.instructions}"</p>
                                            <div>
                                                <div className="text-[10px] uppercase tracking-widest opacity-50 mb-1">Ingredients</div>
                                                <div className="flex flex-wrap gap-1">{genRecipe.ingredients.map((ing, i) => (<span key={i} className={`text-[10px] px-2 py-0.5 rounded ${theme === 'dark' ? 'bg-black/40' : 'bg-white/60'}`}>{ing}</span>))}</div>
                                            </div>

                                    <button 
                                        onClick={handleGenRecipe} disabled={loadingRecipe}
                                        className={`w-full py-2 rounded-full text-xs font-bold uppercase border transition-all active:scale-95 ${theme === 'dark' ? 'border-teal-800 text-teal-500 hover:bg-teal-900' : 'border-teal-100 text-teal-700 hover:bg-teal-50'} ${loadingRecipe ? 'opacity-50 cursor-not-allowed' : ''}`}
                                    >
                                        <Sparkles size={12} className={`inline mr-2 ${loadingRecipe ? 'animate-spin' : ''}`}/> 
                                        {loadingRecipe ? 'Generating...' : (genRecipe ? 'Generate Another' : 'Generate New')}
